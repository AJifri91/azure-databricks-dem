# Databricks Job Scheduler for Tech Layoffs Pipeline
name: "Tech Layoffs Analysis - Daily Run"
schedule:
  quartz_cron_expression: "0 0 6 * * ?"   # every day at 06:00
  timezone_id: "Europe/Stockholm"

tasks:
  - task_key: "run_layoffs_notebook"
    notebook_task:
      notebook_path: "/Workspace/Users/ahmedaljifri91@gmail.com/layoff_analysis"  # change to your actual notebook path
      source: "WORKSPACE"
    existing_cluster_id: "0325-175414-hikxcq2o?o"   # change to your cluster ID
    timeout_seconds: 3600
    max_retries: 1

email_notifications:
  on_success: ["ahmedaljifri91@gmail.com"]
  on_failure: ["ahmedaljifri91@gmail.com"]

max_concurrent_runs: 1
